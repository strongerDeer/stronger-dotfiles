name: Jira Auto Complete on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  auto-complete-jira:
    name: Auto Complete Jira Ticket
    runs-on: ubuntu-latest

    # PRмқҙ мӢӨм ңлЎң лЁём§Җлҗң кІҪмҡ°м—җл§Ң мӢӨн–ү
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Jira ticket from branch name
        id: extract-ticket
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Branch name: $BRANCH_NAME"

          # м •к·ңмӢқмңјлЎң Jira нӢ°мј“ м¶”м¶ң (мҳҲ: AUR-6-fe-task-pr вҶ’ AUR-6)
          JIRA_KEY=$(echo "$BRANCH_NAME" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          if [ -z "$JIRA_KEY" ]; then
            echo "вҡ пёҸ  лёҢлһңм№ҳлӘ…м—җм„ң Jira нӢ°мј“мқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ: $BRANCH_NAME"
            echo "has_ticket=false" >> $GITHUB_OUTPUT
          else
            echo "вң… Jira нӢ°мј“ л°ңкІ¬: $JIRA_KEY"
            echo "has_ticket=true" >> $GITHUB_OUTPUT
            echo "ticket=$JIRA_KEY" >> $GITHUB_OUTPUT
          fi

      - name: Get transition ID from config
        id: get-transition
        if: steps.extract-ticket.outputs.has_ticket == 'true'
        run: |
          if [ -f "scripts/jira/jira-workflow-config.json" ]; then
            END_TRANSITION_ID=$(jq -r '.mappings.end // ""' scripts/jira/jira-workflow-config.json)
            
            if [ -n "$END_TRANSITION_ID" ] && [ "$END_TRANSITION_ID" != "null" ]; then
              echo "transition_id=$END_TRANSITION_ID" >> $GITHUB_OUTPUT
              echo "has_transition=true" >> $GITHUB_OUTPUT
              echo "вң… Transition ID: $END_TRANSITION_ID"
            else
              echo "has_transition=false" >> $GITHUB_OUTPUT
              echo "вҡ пёҸ  jira-workflow-config.jsonм—җ 'end' transition IDк°Җ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ."
            fi
          else
            echo "has_transition=false" >> $GITHUB_OUTPUT
            echo "вҡ пёҸ  jira-workflow-config.json нҢҢмқјмқҙ м—ҶмҠөлӢҲлӢӨ."
          fi

      - name: Transition Jira ticket to complete
        if: steps.extract-ticket.outputs.has_ticket == 'true' && steps.get-transition.outputs.has_transition == 'true'
        continue-on-error: true
        run: |
          ISSUE_KEY="${{ steps.extract-ticket.outputs.ticket }}"
          TRANSITION_ID="${{ steps.get-transition.outputs.transition_id }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          echo "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"
          echo "рҹҺҜ Jira нӢ°мј“ мғҒнғң ліҖкІҪ мӢңмһ‘"
          echo "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"
          echo "рҹ“Ӣ Ticket: $ISSUE_KEY"
          echo "рҹ”„ Transition ID: $TRANSITION_ID"
          echo "рҹ”— PR: #$PR_NUMBER"
          echo ""

          # Jira нӢ°мј“ мғҒнғң ліҖкІҪ
          TRANSITION_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -d "{\"transition\":{\"id\":\"${TRANSITION_ID}\"}}" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/2/issue/${ISSUE_KEY}/transitions")

          TRANSITION_HTTP_CODE=$(echo "$TRANSITION_RESPONSE" | tail -n 1)

          if [ "$TRANSITION_HTTP_CODE" = "204" ] || [ "$TRANSITION_HTTP_CODE" = "200" ]; then
            echo "вң… Jira нӢ°мј“ мғҒнғңк°Җ 'мҷ„лЈҢ'лЎң ліҖкІҪлҗҳм—ҲмҠөлӢҲлӢӨ"
          else
            echo "вҡ пёҸ  Jira мғҒнғң ліҖкІҪ мӢӨнҢЁ (HTTP $TRANSITION_HTTP_CODE)"
            echo "мқ‘лӢө: $(echo "$TRANSITION_RESPONSE" | head -n -1)"
            echo ""
            echo "рҹ’Ў к°ҖлҠҘн•ң мӣҗмқё:"
            echo "  - мқҙлҜё 'мҷ„лЈҢ' мғҒнғңмқё нӢ°мј“"
            echo "  - мһҳлӘ»лҗң transition ID (scripts/jira/jira-workflow-config.json нҷ•мқё)"
            echo "  - мӣҢнҒ¬н”ҢлЎңмҡ° к¶Ңн•ң л¬ём ң"
          fi

          echo ""
          echo "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"
          echo "рҹ’¬ Jira мҪ”л©ҳнҠё м¶”к°Җ мӨ‘..."
          echo "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"

          # Jiraм—җ PR лЁём§Җ мҪ”л©ҳнҠё м¶”к°Җ
          COMMENT_TEXT="рҹҺү PRмқҙ develop лёҢлһңм№ҳм—җ лЁём§Җлҗҳм—ҲмҠөлӢҲлӢӨ\n\n*PR:* [#${PR_NUMBER} ${PR_TITLE}|${PR_URL}]\n*Branch:* \`${{ github.event.pull_request.head.ref }}\`\n*Merged by:* ${{ github.actor }}"

          COMMENT_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -d "{\"body\":\"${COMMENT_TEXT}\"}" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/2/issue/${ISSUE_KEY}/comment")

          COMMENT_HTTP_CODE=$(echo "$COMMENT_RESPONSE" | tail -n 1)

          if [ "$COMMENT_HTTP_CODE" = "201" ] || [ "$COMMENT_HTTP_CODE" = "200" ]; then
            echo "вң… Jiraм—җ PR лЁём§Җ мҪ”л©ҳнҠёк°Җ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ"
          else
            echo "вҡ пёҸ  мҪ”л©ҳнҠё м¶”к°Җ мӢӨнҢЁ (HTTP $COMMENT_HTTP_CODE)"
          fi

          echo ""
          echo "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"
          echo "вң… мҷ„лЈҢ!"
          echo "в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ"

      - name: Create summary
        if: steps.extract-ticket.outputs.has_ticket == 'true'
        run: |
          ISSUE_KEY="${{ steps.extract-ticket.outputs.ticket }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          echo "## рҹҺү Jira мһҗлҸҷ мҷ„лЈҢ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Jira Ticket:** [\`${ISSUE_KEY}\`](${{ secrets.JIRA_BASE_URL }}/browse/${ISSUE_KEY})" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** [#${PR_NUMBER}](${{ github.event.pull_request.html_url }})" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.event.pull_request.head.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.get-transition.outputs.has_transition }}" = "true" ]; then
            echo "вң… Jira нӢ°мј“мқҙ мһҗлҸҷмңјлЎң мҷ„лЈҢ мғҒнғңлЎң ліҖкІҪлҗҳм—ҲмҠөлӢҲлӢӨ." >> $GITHUB_STEP_SUMMARY
          else
            echo "вҡ пёҸ  Transition IDк°Җ м„Өм •лҗҳм§Җ м•Ҡм•„ мғҒнғң ліҖкІҪмқ„ кұҙл„Ҳлӣ°м—ҲмҠөлӢҲлӢӨ." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**м„Өм • л°©лІ•:** \`scripts/jira/jira-workflow-config.json\`м—җ \`end\` transition IDлҘј м¶”к°Җн•ҳм„ёмҡ”." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Skip summary (no ticket)
        if: steps.extract-ticket.outputs.has_ticket == 'false'
        run: |
          echo "## в„№пёҸ Jira нӢ°мј“ м—ҶмқҢ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "лёҢлһңм№ҳлӘ…м—җм„ң Jira нӢ°мј“мқ„ м°ҫмқ„ мҲҳ м—Ҷм–ҙ мһҗлҸҷ мҷ„лЈҢлҘј кұҙл„Ҳлӣ°м—ҲмҠөлӢҲлӢӨ." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.event.pull_request.head.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "рҹ’Ў лёҢлһңм№ҳлӘ… нҳ•мӢқ: \`AUR-123-description\` лҳҗлҠ” \`feature/AUR-123-description\`" >> $GITHUB_STEP_SUMMARY
